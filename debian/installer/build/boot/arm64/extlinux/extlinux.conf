## CTX OS ARM64 Boot Configuration
## extlinux configuration for ARM64

UI menu.c32
PROMPT 0
TIMEOUT 50
DEFAULT ctxos

MENU TITLE CTX OS Boot Menu
MENU BACKGROUND splash.png

LABEL ctxos
    MENU LABEL CTX OS
    LINUX /vmlinuz
    INITRD /initrd.gz
    APPEND root=/dev/ram0 ramdisk_size=131072 console=ttyAMA0,115200

LABEL ctxos-rescue
    MENU LABEL CTX OS (Rescue)
    LINUX /vmlinuz
    INITRD /initrd.gz
    APPEND root=/dev/ram0 ramdisk_size=131072 single console=ttyAMA0,115200
