name: CTX OS CI/CD

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find bin/ -type f -name '*.sh' -o -name 'ctx-*' -o -name 'ftpsync*' -o -name 'runmirrors' -o -name 'rsync-*' -o -name 'mirror-*' -o -name 'archive_*' -o -name 'common' -o -name 'include-*' | xargs shellcheck -x

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc shellcheck kcov
          git clone https://github.com/bats-core/bats-core.git /tmp/bats-core
          echo "/tmp/bats-core/bin" >> $GITHUB_PATH

      - name: Build Project
        run: make clean && make all

      - name: Run BATS Tests with Coverage
        run: |
          mkdir -p coverage
          kcov --bash-hack=on --exclude-pattern=.*test.* coverage bats tests/

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          directory: coverage
          fail_below_threshold: false

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/gpg | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy Filesystem Scan
        run: |
          trivy fs --severity HIGH,CRITICAL --exit-code 1 .

  build-and-deploy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts reprepro gpg gpg-agent wget

      - name: Install dpkg-dev
        run: |
          sudo apt-get install -y dpkg-dev

      - name: Import GPG Key
        if: env.GPG_PRIVATE_KEY != ''
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --import --batch --yes
          echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf 2>/dev/null || true

      - name: Build Debian Package
        run: |
          chmod +x bin/*.sh debian/rules debian/postinst debian/postrm debian/preinst debian/prerm
          debuild -us -uc
          mkdir -p build_assets
          cp ../ctxos-core*.deb build_assets/ 2>/dev/null || true

      - name: Update Reprepro Repository
        run: |
          TARGET_BRANCH="testing"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TARGET_BRANCH="bookworm"
          fi

          echo "Building for: $TARGET_BRANCH"

          if [ -d "debian" ]; then
            echo "Debian directory found"
          fi

      - name: Create Release Artifacts
        run: |
          mkdir -p release
          cp ../ctxos-core*.deb release/ 2>/dev/null || echo "No .deb found"
          ls -la release/

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctxos-packages
          path: release/
          retention-days: 30
