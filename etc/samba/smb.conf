[global]
   workgroup = WORKGROUP
   server string = CtxOS File Server
   server role = standalone server
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   panic action = /usr/share/samba/panic-action %d
   server min protocol = SMB2
   map to guest = bad user
   usershare allow guests = yes

[homes]
   comment = Home Directories
   browseable = no
   read only = no
   create mask = 0700
   directory mask = 0700
   valid users = %S

[Public]
   path = /home/public
   comment = CtxOS Public Share
   guest ok = yes
   read only = yes
   browseable = yes
   create mask = 0777
   directory mask = 0777
