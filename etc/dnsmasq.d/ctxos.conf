# CtxOS - DNS/DHCP Configuration for Security Operations
# Optimized for Debian-based security distribution

port=53

domain-needed
bogus-priv

strict-order
no-resolv

server=8.8.8.8
server=8.8.4.4
server=1.1.1.1
server=1.0.0.1

interface=lo
bind-interfaces
listen-address=127.0.0.1

expand-hosts
domain=ctxos.local
local=/ctxos.local/

cache-size=1000

local-ttl=60

no-negcache

log-queries
log-dhcp

log-facility=/var/log/dnsmasq.log

domain-suffix=ctxos.local

rebind-localhost-ok
rebind-domain-ok=/lan./

stop-dns-rebind

bogus-nxdomain=64.94.110.11

dhcp-leasefile=/var/lib/misc/dnsmasq.leases
dhcp-lease-max=150
dhcp-authoritative

enable-dbus

dns-forward-max=150

edns-packet-max=4096

conntrack

reload-check

reload-inotify

rebind-timeout=1000

max-ttl=86400

min-cache-ttl=60
